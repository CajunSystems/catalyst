name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & test (JDK 21)
    runs-on: ubuntu-latest
    env:
      GUMBO_VERSION: "0.2.0"
    steps:
      - name: Checkout Catalyst
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Catalyst depends on com.cajunsystems:gumbo. The intended source is JitPack, but to keep CI
      # deterministic (and independent of JitPack availability / egress policy) we build the pinned
      # Gumbo release tag and install it into the local Maven repo before building Catalyst.
      - name: Install Gumbo ${{ env.GUMBO_VERSION }} into local Maven repo
        run: |
          set -euo pipefail
          if [ -d "$HOME/.m2/repository/com/cajunsystems/gumbo/${GUMBO_VERSION}" ]; then
            echo "Gumbo ${GUMBO_VERSION} already cached in ~/.m2 — skipping build."
          else
            git clone --depth 1 --branch "${GUMBO_VERSION}" https://github.com/CajunSystems/gumbo.git /tmp/gumbo
            mvn -B --no-transfer-progress -f /tmp/gumbo/pom.xml install -DskipTests
          fi

      - name: Build and test
        run: mvn -B --no-transfer-progress install

      # The literal M0 exit criterion (spec §11): kill -9 mid-task across two separate JVMs, resume,
      # finish with zero duplicate model calls. CI is the source of truth that each phase still holds.
      - name: M0 exit demo (kill -9 → resume across two processes)
        run: |
          set -uo pipefail
          mvn -B --no-transfer-progress -q -pl catalyst-api \
            org.apache.maven.plugins:maven-dependency-plugin:3.6.1:build-classpath \
            -Dmdep.outputFile=target/cp.txt
          CP="catalyst-api/target/classes:$(cat catalyst-api/target/cp.txt)"
          DIR="$(mktemp -d)"

          echo "--- process 1: record then kill -9 (exit 137) ---"
          rc=0
          java -cp "$CP" com.cajunsystems.catalyst.api.Demo "$DIR" record || rc=$?
          echo "record exit code: $rc"
          if [ "$rc" -ne 137 ]; then echo "FAIL: record did not simulate kill -9 (exit $rc)"; exit 1; fi

          echo "--- process 2: resume ---"
          OUT="$(java -cp "$CP" com.cajunsystems.catalyst.api.Demo "$DIR" resume)"
          echo "$OUT"
          echo "$OUT" | grep -q "result: SUMMARY|FINAL" \
            || { echo "FAIL: unexpected result (resume did not complete correctly)"; exit 1; }
          echo "$OUT" | grep -q "model calls THIS run: 1" \
            || { echo "FAIL: resume made a duplicate model call"; exit 1; }
          echo "M0 exit criterion holds: resumed with zero duplicate model calls."

      # The M1 exit criterion (spec §11): replay a recorded execution with substitution and zero
      # external calls, verify canonical hashes, and detect a divergent replay.
      - name: M1 exit demo (strict replay with zero external calls)
        run: |
          set -uo pipefail
          CP="catalyst-api/target/classes:$(cat catalyst-api/target/cp.txt)"

          echo "--- replay a recorded execution ---"
          OUT="$(java -cp "$CP" com.cajunsystems.catalyst.api.Demo replay)"
          echo "$OUT"
          echo "$OUT" | grep -q "external calls during replay: 0" \
            || { echo "FAIL: replay made external calls"; exit 1; }
          echo "$OUT" | grep -q "divergence correctly detected" \
            || { echo "FAIL: nondeterministic replay was not detected"; exit 1; }
          echo "M1 exit criterion holds: exact replay, zero external calls, divergence detected."

      # The M2 exit criterion (spec §11): rerun a recorded execution with a different model from
      # step N and print the step-by-step diff.
      - name: M2 exit demo (branch with a different model + diff)
        run: |
          set -uo pipefail
          CP="catalyst-api/target/classes:$(cat catalyst-api/target/cp.txt)"

          echo "--- branch a recorded execution with a swapped model ---"
          OUT="$(java -cp "$CP" com.cajunsystems.catalyst.api.Demo branch)"
          echo "$OUT"
          echo "$OUT" | grep -q "1 step(s) changed" \
            || { echo "FAIL: branch diff did not report the expected change"; exit 1; }
          echo "$OUT" | grep -q "MODEL  CHANGED" \
            || { echo "FAIL: branch diff did not mark the model step changed"; exit 1; }
          echo "M2 exit criterion holds: branch with a swapped model produced a step-by-step diff."

      # The v0.2 durability exit criterion (roadmap — Snapshots): a long execution is checkpointed so
      # inspect/resume folds from the snapshot forward instead of re-folding the whole log, and the
      # snapshot fold matches a full re-fold exactly.
      - name: v0.2 Snapshot exit demo (fold from a checkpoint, not the whole log)
        run: |
          set -uo pipefail
          CP="catalyst-api/target/classes:$(cat catalyst-api/target/cp.txt)"

          echo "--- fold a long execution from a snapshot ---"
          OUT="$(java -cp "$CP" com.cajunsystems.catalyst.api.Demo snapshot)"
          echo "$OUT"
          echo "$OUT" | grep -q "snapshot fold matches full fold: true" \
            || { echo "FAIL: snapshot fold diverged from a full re-fold"; exit 1; }
          COLD="$(echo "$OUT" | sed -n 's/.*cold inspect folded \([0-9]*\) events.*/\1/p')"
          WARM="$(echo "$OUT" | sed -n 's/.*warm inspect folded \([0-9]*\) events.*/\1/p')"
          [ -n "$COLD" ] && [ -n "$WARM" ] && [ "$WARM" -lt "$COLD" ] \
            || { echo "FAIL: warm inspect did not fold fewer events than cold ($WARM vs $COLD)"; exit 1; }
          echo "v0.2 Snapshot exit criterion holds: warm fold read $WARM events vs $COLD cold, results identical."
